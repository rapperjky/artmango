<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>아트마켓 - 예술품 사고팔기</title>
<style>
  :root {
    --primary: #ff6f3c;
    --bg: #f7f7f9;
    --card-bg: #ffffff;
    --text: #222;
    --sub: #888;
    --border: #eaeaea;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding-bottom: 70px;
  }
  header {
    position: sticky; top: 0; z-index: 50;
    background: #fff; border-bottom: 1px solid var(--border);
    padding: 14px 16px; display: flex; align-items: center; justify-content: space-between;
  }
  header h1 { font-size: 20px; color: var(--primary); cursor: pointer; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  header nav button {
    background: none; border: none; font-size: 14px; color: var(--text); cursor: pointer; padding: 8px;
  }
  .user-info { font-size: 13px; color: var(--sub); }
  .container { max-width: 960px; margin: 0 auto; padding: 16px; }

  /* 검색/필터 */
  .search-bar { display: flex; gap: 8px; margin-bottom: 12px; }
  .search-bar input {
    flex: 1; padding: 10px 14px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
  }
  .categories { display: flex; gap: 8px; overflow-x: auto; margin-bottom: 16px; padding-bottom: 4px; }
  .categories button {
    flex-shrink: 0; padding: 6px 14px; border-radius: 16px; border: 1px solid var(--border);
    background: #fff; font-size: 13px; cursor: pointer; color: var(--sub);
  }
  .categories button.active { background: var(--primary); color: #fff; border-color: var(--primary); }

  /* 카드 그리드 */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 14px; }
  .card {
    background: var(--card-bg); border-radius: 10px; overflow: hidden; cursor: pointer;
    border: 1px solid var(--border); transition: transform .1s;
  }
  .card:hover { transform: translateY(-2px); }
  .card img { width: 100%; height: 150px; object-fit: cover; display: block; background: #ddd; }
  .card-body { padding: 10px; }
  .card-title { font-size: 14px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-price { font-size: 15px; font-weight: 700; }
  .card-cat { font-size: 11px; color: var(--sub); margin-top: 4px; }
  .empty { text-align: center; color: var(--sub); padding: 60px 0; font-size: 14px; }

  /* FAB */
  .fab {
    position: fixed; bottom: 24px; right: 24px; background: var(--primary); color: #fff;
    border: none; border-radius: 28px; padding: 14px 22px; font-size: 15px; font-weight: 600;
    box-shadow: 0 4px 12px rgba(255,111,60,.4); cursor: pointer; z-index: 40;
  }

  /* 폼 */
  .form-group { margin-bottom: 14px; }
  .form-group label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
  .form-group input, .form-group select, .form-group textarea {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 8px; font-size: 14px;
    font-family: inherit;
  }
  .form-group textarea { resize: vertical; min-height: 90px; }
  .img-preview { width: 100%; max-width: 240px; height: 180px; object-fit: cover; border-radius: 8px; margin-top: 8px; background: #eee; display: none; }
  .btn-primary {
    background: var(--primary); color: #fff; border: none; padding: 12px 20px; border-radius: 8px;
    font-size: 15px; font-weight: 600; cursor: pointer; width: 100%;
  }
  .btn-secondary {
    background: #fff; color: var(--text); border: 1px solid var(--border); padding: 10px 16px; border-radius: 8px;
    font-size: 14px; cursor: pointer;
  }
  .btn-google {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    background: #fff; color: var(--text); border: 1px solid var(--border); padding: 12px 20px; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; margin-bottom: 12px;
  }

  /* 상세 페이지 */
  .detail-img { width: 100%; max-height: 420px; object-fit: cover; border-radius: 10px; background: #ddd; }
  .detail-title { font-size: 22px; font-weight: 700; margin: 16px 0 4px; }
  .detail-price { font-size: 20px; font-weight: 700; color: var(--primary); margin-bottom: 8px; }
  .detail-meta { font-size: 13px; color: var(--sub); margin-bottom: 16px; }
  .detail-desc { font-size: 14px; line-height: 1.7; white-space: pre-wrap; margin-bottom: 20px; padding-bottom: 20px; border-bottom: 1px solid var(--border); }
  .seller-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
  .seller-name { font-size: 14px; font-weight: 600; }

  /* 채팅 */
  .chat-box { border: 1px solid var(--border); border-radius: 10px; background: #fff; }
  .chat-messages { height: 260px; overflow-y: auto; padding: 12px; display: flex; flex-direction: column; gap: 8px; }
  .chat-msg { max-width: 75%; padding: 8px 12px; border-radius: 14px; font-size: 13px; line-height: 1.4; }
  .chat-msg.me { align-self: flex-end; background: var(--primary); color: #fff; }
  .chat-msg.other { align-self: flex-start; background: var(--bg); }
  .chat-msg-name { font-size: 11px; color: var(--sub); margin-bottom: 2px; }
  .chat-input-row { display: flex; border-top: 1px solid var(--border); padding: 8px; gap: 8px; }
  .chat-input-row input { flex: 1; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: 13px; }
  .chat-input-row button { background: var(--primary); color: #fff; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 13px; }
  .chat-empty { text-align: center; color: var(--sub); font-size: 13px; padding: 20px 0; }

  .page-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
  .hidden { display: none !important; }

  /* 인증 폼 */
  .auth-card { max-width: 400px; margin: 40px auto; padding: 24px; background: #fff; border-radius: 12px; border: 1px solid var(--border); }
  .auth-title { font-size: 24px; font-weight: 700; text-align: center; margin-bottom: 20px; }
  .tabs { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 1px solid var(--border); }
  .tab-btn { flex: 1; padding: 12px; text-align: center; border: none; background: none; cursor: pointer; font-size: 14px; font-weight: 600; color: var(--sub); border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
  .error-msg { color: #e74c3c; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>

<header>
  <h1 onclick="showView('home')">🎨 아트마켓</h1>
  <div class="header-right">
    <div class="user-info" id="userInfo"></div>
    <nav>
      <button id="loginNavBtn" onclick="showView('auth')" style="margin-right:10px; font-size:14px;">로그인</button>
      <button id="navBtn" class="hidden" onclick="showView('write')">+ 작품 등록</button>
      <button id="logoutBtn" class="hidden" onclick="logoutUser()" style="color:#888; font-size:13px;">로그아웃</button>
    </nav>
  </div>
</header>

<div class="container">

  <!-- 인증 -->
  <div id="view-auth" class="hidden">
    <div class="auth-card">
      <div class="auth-title">🎨 아트마켓</div>
      <div class="tabs">
        <button class="tab-btn active" onclick="switchAuthTab('login')">로그인</button>
        <button class="tab-btn" onclick="switchAuthTab('signup')">회원가입</button>
      </div>

      <!-- 로그인 -->
      <div id="auth-login" class="tab-content active">
        <button class="btn-google" onclick="loginWithGoogle()">
          <span>🔵</span> Google로 로그인
        </button>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="loginEmail" placeholder="이메일">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호">
        </div>
        <button class="btn-primary" onclick="loginWithEmail()">로그인</button>
        <div class="error-msg" id="loginError"></div>
      </div>

      <!-- 회원가입 -->
      <div id="auth-signup" class="tab-content">
        <button class="btn-google" onclick="signupWithGoogle()">
          <span>🔵</span> Google로 가입
        </button>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="signupEmail" placeholder="이메일">
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="signupPassword" placeholder="비밀번호 (6자 이상)">
        </div>
        <div class="form-group">
          <label>닉네임</label>
          <input type="text" id="signupNickname" placeholder="닉네임">
        </div>
        <button class="btn-primary" onclick="signupWithEmail()">회원가입</button>
        <div class="error-msg" id="signupError"></div>
      </div>
    </div>
  </div>

  <!-- 홈: 목록/검색 -->
  <div id="view-home" class="hidden">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="작품명, 작가명으로 검색">
    </div>
    <div class="categories" id="categoryBar"></div>
    <div class="grid" id="artGrid"></div>
    <div class="empty hidden" id="emptyMsg">조건에 맞는 작품이 없습니다.</div>
  </div>

  <!-- 등록 -->
  <div id="view-write" class="hidden">
    <div class="page-title">작품 등록</div>
    <form id="writeForm">
      <div class="form-group">
        <label>이미지</label>
        <input type="file" id="imgInput" accept="image/*">
        <img id="imgPreview" class="img-preview">
      </div>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="titleInput" required placeholder="예: 봄날의 풍경 (캔버스 油화)">
      </div>
      <div class="form-group">
        <label>가격 (원)</label>
        <input type="number" id="priceInput" required placeholder="예: 150000" min="0">
      </div>
      <div class="form-group">
        <label>카테고리</label>
        <select id="catInput">
          <option value="회화">회화</option>
          <option value="일러스트">일러스트</option>
          <option value="조각/공예">조각/공예</option>
          <option value="사진">사진</option>
          <option value="디지털아트">디지털아트</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="form-group">
        <label>작가/판매자명</label>
        <input type="text" id="sellerInput" required placeholder="닉네임">
      </div>
      <div class="form-group">
        <label>작품 설명</label>
        <textarea id="descInput" placeholder="작품 크기, 재료, 상태 등을 적어주세요"></textarea>
      </div>
      <button type="submit" class="btn-primary">등록하기</button>
    </form>
  </div>

  <!-- 상세 -->
  <div id="view-detail" class="hidden">
    <button class="btn-secondary" onclick="showView('home')" style="margin-bottom:12px;">← 목록으로</button>
    <img id="detailImg" class="detail-img">
    <div class="detail-title" id="detailTitle"></div>
    <div class="detail-price" id="detailPrice"></div>
    <div class="detail-meta" id="detailMeta"></div>
    <div class="detail-desc" id="detailDesc"></div>
    <div class="seller-row">
      <div class="seller-name" id="detailSeller"></div>
      <button class="btn-secondary" onclick="document.getElementById('chatSection').scrollIntoView({behavior:'smooth'})">채팅 문의</button>
    </div>

    <div class="page-title">판매자와 대화하기</div>
    <div class="chat-box" id="chatSection">
      <div class="chat-messages" id="chatMessages"></div>
      <div class="chat-input-row">
        <input type="text" id="chatNameInput" placeholder="닉네임" style="max-width:90px;">
        <input type="text" id="chatTextInput" placeholder="메시지를 입력하세요">
        <button onclick="sendChat()">전송</button>
      </div>
    </div>
  </div>

</div>

<button class="fab hidden" id="fabBtn" onclick="showView('write')">+ 판매하기</button>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.14.0/firebase-auth-compat.js"></script>
<script>
// Firebase 설정
firebase.initializeApp({
  apiKey: "AIzaSyAwAwxda4zaYFZ1t3_TNitAdzunfd6z9KM",
  authDomain: "artmango-53de4.firebaseapp.com",
  projectId: "artmango-53de4",
  storageBucket: "artmango-53de4.firebasestorage.app",
  messagingSenderId: "728255217725",
  appId: "1:728255217725:web:4a5f3e8c9d2b1f6e7c9a0"
});

const auth = firebase.auth();
const googleProvider = new firebase.auth.GoogleAuthProvider();

window.loginWithGoogle = () => auth.signInWithPopup(googleProvider).catch(err => document.getElementById('loginError').textContent = err.message);
window.signupWithGoogle = () => auth.signInWithPopup(googleProvider).catch(err => document.getElementById('signupError').textContent = err.message);

window.loginWithEmail = async () => {
  const email = document.getElementById('loginEmail').value.trim();
  const password = document.getElementById('loginPassword').value;
  const errorDiv = document.getElementById('loginError');
  errorDiv.textContent = '';
  if (!email || !password) { errorDiv.textContent = '이메일과 비밀번호를 입력하세요.'; return; }
  try {
    await auth.signInWithEmailAndPassword(email, password);
  } catch (err) {
    errorDiv.textContent = '로그인 실패: ' + err.message;
  }
};

window.signupWithEmail = async () => {
  const email = document.getElementById('signupEmail').value.trim();
  const password = document.getElementById('signupPassword').value;
  const nickname = document.getElementById('signupNickname').value.trim();
  const errorDiv = document.getElementById('signupError');
  errorDiv.textContent = '';
  if (!email || !password || !nickname) { errorDiv.textContent = '모든 항목을 입력하세요.'; return; }
  if (password.length < 6) { errorDiv.textContent = '비밀번호는 6자 이상이어야 합니다.'; return; }
  try {
    const result = await auth.createUserWithEmailAndPassword(email, password);
    localStorage.setItem('user_' + result.user.uid, JSON.stringify({ nickname, email }));
  } catch (err) {
    errorDiv.textContent = '회원가입 실패: ' + err.message;
  }
};

window.logoutUser = async () => {
  await auth.signOut();
};

auth.onAuthStateChanged((user) => {
  if (user) {
    const userData = JSON.parse(localStorage.getItem('user_' + user.uid) || JSON.stringify({}));
    const nickname = userData.nickname || user.displayName || user.email.split('@')[0];
    localStorage.setItem('user_' + user.uid, JSON.stringify({ nickname, email: user.email }));
    window.currentUser = { uid: user.uid, email: user.email, nickname };
    updateAuthUI(true);
  } else {
    window.currentUser = null;
    updateAuthUI(false);
  }
});

window.switchAuthTab = (tab) => {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('auth-' + tab).classList.add('active');
};

window.updateAuthUI = (isLoggedIn) => {
  const userInfo = document.getElementById('userInfo');
  const logoutBtn = document.getElementById('logoutBtn');
  const navBtn = document.getElementById('navBtn');
  const loginNavBtn = document.getElementById('loginNavBtn');
  const fabBtn = document.getElementById('fabBtn');
  if (isLoggedIn) {
    userInfo.textContent = '👋 ' + (window.currentUser?.nickname || '사용자');
    loginNavBtn.classList.add('hidden');
    logoutBtn.classList.remove('hidden');
    navBtn.classList.remove('hidden');
    fabBtn.classList.remove('hidden');
  } else {
    userInfo.textContent = '';
    loginNavBtn.classList.remove('hidden');
    logoutBtn.classList.add('hidden');
    navBtn.classList.add('hidden');
    fabBtn.classList.add('hidden');
  }
};

// 이하 기존 코드 (마켓플레이스 로직)
const CATEGORIES = ["전체","회화","일러스트","조각/공예","사진","디지털아트","기타"];
let currentCategory = "전체";
let currentDetailId = null;

function placeholderImg(text, hue) {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" width="400" height="300">
    <rect width="100%" height="100%" fill="hsl(${hue},60%,85%)"/>
    <text x="50%" y="50%" font-size="22" fill="hsl(${hue},40%,40%)" text-anchor="middle" dominant-baseline="middle" font-family="sans-serif">${text}</text>
  </svg>`;
  return "data:image/svg+xml;utf8," + encodeURIComponent(svg);
}

const SEED = [
  { id: 1, title: "노을빛 들판", price: 180000, category: "회화", seller: "김화가", desc: "캔버스에 유화, 40x60cm. 따뜻한 노을빛 풍경을 담은 작품입니다. 액자 포함.", image: placeholderImg("회화 1", 20) },
  { id: 2, title: "도시의 밤", price: 95000, category: "디지털아트", seller: "도트작가", desc: "디지털 프린트, A2 사이즈. 한정판 10/50.", image: placeholderImg("디지털아트", 220) },
  { id: 3, title: "고양이 일러스트 원화", price: 45000, category: "일러스트", seller: "냥냥작가", desc: "수채화 원화, A4 사이즈. 따뜻한 색감의 고양이 그림.", image: placeholderImg("일러스트", 320) },
  { id: 4, title: "나무 조각상 '기다림'", price: 250000, category: "조각/공예", seller: "목공예가", desc: "느티나무 조각, 높이 30cm. 핸드메이드 1점.", image: placeholderImg("조각/공예", 30) },
  { id: 5, title: "흑백 풍경 사진 액자", price: 60000, category: "사진", seller: "포토그래퍼", desc: "필름 사진 인화, 30x40cm 액자 포함.", image: placeholderImg("사진", 0) },
  { id: 6, title: "추상화 '균형'", price: 320000, category: "회화", seller: "김화가", desc: "캔버스에 아크릴, 80x100cm. 갤러리 전시 작품.", image: placeholderImg("회화 2", 20) },
];

function loadArtworks() {
  const data = localStorage.getItem("artmarket_items");
  if (!data) {
    localStorage.setItem("artmarket_items", JSON.stringify(SEED));
    return SEED;
  }
  return JSON.parse(data);
}
function saveArtworks(items) {
  localStorage.setItem("artmarket_items", JSON.stringify(items));
}
function loadChats() {
  return JSON.parse(localStorage.getItem("artmarket_chats") || "{}");
}
function saveChats(chats) {
  localStorage.setItem("artmarket_chats", JSON.stringify(chats));
}

function formatPrice(p) {
  return Number(p).toLocaleString("ko-KR") + "원";
}

window.showView = (name) => {
  ["auth","home","write","detail"].forEach(v => {
    document.getElementById("view-" + v).classList.toggle("hidden", v !== name);
  });
  if (name === "home") renderGrid();
  window.scrollTo(0,0);
};

function renderCategoryBar() {
  const bar = document.getElementById("categoryBar");
  bar.innerHTML = "";
  CATEGORIES.forEach(cat => {
    const btn = document.createElement("button");
    btn.textContent = cat;
    if (cat === currentCategory) btn.classList.add("active");
    btn.onclick = () => { currentCategory = cat; renderCategoryBar(); renderGrid(); };
    bar.appendChild(btn);
  });
}

function renderGrid() {
  const items = loadArtworks();
  const keyword = document.getElementById("searchInput").value.trim().toLowerCase();
  const filtered = items.filter(it => {
    const matchCat = currentCategory === "전체" || it.category === currentCategory;
    const matchKeyword = !keyword || it.title.toLowerCase().includes(keyword) || it.seller.toLowerCase().includes(keyword);
    return matchCat && matchKeyword;
  }).sort((a,b) => b.id - a.id);

  const grid = document.getElementById("artGrid");
  const emptyMsg = document.getElementById("emptyMsg");
  grid.innerHTML = "";
  emptyMsg.classList.toggle("hidden", filtered.length > 0);

  filtered.forEach(it => {
    const card = document.createElement("div");
    card.className = "card";
    card.onclick = () => openDetail(it.id);
    card.innerHTML = `
      <img src="${it.image}" alt="${it.title}">
      <div class="card-body">
        <div class="card-title">${escapeHtml(it.title)}</div>
        <div class="card-price">${formatPrice(it.price)}</div>
        <div class="card-cat">${it.category} · ${escapeHtml(it.seller)}</div>
      </div>`;
    grid.appendChild(card);
  });
}

function escapeHtml(str) {
  const div = document.createElement("div");
  div.textContent = str;
  return div.innerHTML;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById("searchInput").addEventListener("input", renderGrid);

  let uploadedImage = null;
  document.getElementById("imgInput").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      uploadedImage = ev.target.result;
      const preview = document.getElementById("imgPreview");
      preview.src = uploadedImage;
      preview.style.display = "block";
    };
    reader.readAsDataURL(file);
  });

  document.getElementById("writeForm").addEventListener("submit", (e) => {
    e.preventDefault();
    if (!window.currentUser) { alert('로그인이 필요합니다.'); return; }
    const items = loadArtworks();
    const newItem = {
      id: Date.now(),
      title: document.getElementById("titleInput").value.trim(),
      price: Number(document.getElementById("priceInput").value),
      category: document.getElementById("catInput").value,
      seller: window.currentUser.nickname,
      userId: window.currentUser.uid,
      desc: document.getElementById("descInput").value.trim(),
      image: uploadedImage || placeholderImg(document.getElementById("catInput").value, Math.floor(Math.random()*360)),
    };
    items.push(newItem);
    saveArtworks(items);
    e.target.reset();
    document.getElementById("imgPreview").style.display = "none";
    uploadedImage = null;
    showView('home');
  });

  renderCategoryBar();
});

window.openDetail = (id) => {
  const items = loadArtworks();
  const item = items.find(it => it.id === id);
  if (!item) return;
  currentDetailId = id;
  document.getElementById("detailImg").src = item.image;
  document.getElementById("detailTitle").textContent = item.title;
  document.getElementById("detailPrice").textContent = formatPrice(item.price);
  document.getElementById("detailMeta").textContent = item.category;
  document.getElementById("detailDesc").textContent = item.desc || "설명이 없습니다.";
  document.getElementById("detailSeller").textContent = "판매자: " + item.seller;
  renderChat();
  showView('detail');
};

function renderChat() {
  const chats = loadChats();
  const messages = chats[currentDetailId] || [];
  const box = document.getElementById("chatMessages");
  box.innerHTML = "";
  if (messages.length === 0) {
    box.innerHTML = `<div class="chat-empty">아직 대화가 없습니다. 판매자에게 메시지를 보내보세요!</div>`;
  } else {
    messages.forEach(m => {
      const div = document.createElement("div");
      div.className = "chat-msg " + (m.name === "구매자" ? "me" : "other");
      div.innerHTML = `<div class="chat-msg-name">${escapeHtml(m.name)}</div>${escapeHtml(m.text)}`;
      box.appendChild(div);
    });
  }
  box.scrollTop = box.scrollHeight;
}

window.sendChat = () => {
  const nameInput = document.getElementById("chatNameInput");
  const textInput = document.getElementById("chatTextInput");
  const name = nameInput.value.trim() || "구매자";
  const text = textInput.value.trim();
  if (!text) return;
  const chats = loadChats();
  if (!chats[currentDetailId]) chats[currentDetailId] = [];
  chats[currentDetailId].push({ name, text, time: Date.now() });
  saveChats(chats);
  textInput.value = "";
  renderChat();
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById("chatTextInput")?.addEventListener("keydown", (e) => {
    if (e.key === "Enter") sendChat();
  });
});
</script>
